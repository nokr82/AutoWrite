<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>설정 - 자동 포스팅</title>
<style>
  body { font-family: -apple-system, "Malgun Gothic", sans-serif; max-width: 560px; margin: 40px auto; padding: 0 16px; color: #222; }
  h1 { font-size: 1.4rem; }
  a.back { display: inline-block; margin-bottom: 16px; color: #555; text-decoration: none; }
  a.back:hover { text-decoration: underline; }
  fieldset { border: 1px solid #ddd; border-radius: 8px; padding: 16px; margin-bottom: 16px; }
  legend { font-weight: 600; padding: 0 6px; }
  label { display: block; margin: 10px 0 4px; font-weight: 500; }
  small.hint { display: block; color: #888; font-weight: 400; margin-top: 2px; }
  input[type=text] { width: 100%; box-sizing: border-box; padding: 8px; border: 1px solid #ccc; border-radius: 6px; font-size: 0.95rem; }
  select { padding: 8px; border: 1px solid #ccc; border-radius: 6px; font-size: 0.95rem; }
  .checkbox-row { display: flex; align-items: center; gap: 8px; margin-top: 10px; }
  .checkbox-row label { margin: 0; font-weight: 400; }
  button[type=submit] { margin-top: 16px; padding: 10px 20px; font-size: 1rem; border: none; border-radius: 6px; background: #222; color: #fff; cursor: pointer; }
  button[type=submit]:hover { background: #444; }
  .flash { padding: 12px; border-radius: 6px; margin-bottom: 16px; }
  .flash.success { background: #d7f4dd; color: #146c2e; }
  .flash.error { background: #fde2e2; color: #a11; }
</style>
</head>
<body>
  <a class="back" href="/">← 글쓰기로 돌아가기</a>
  <h1>설정</h1>

  {% if messages %}
    {% for msg in messages %}
      <div class="flash {{ msg.level }}">{{ msg.text }}</div>
    {% endfor %}
  {% endif %}

  <form action="/settings" method="post">
    <fieldset>
      <legend>티스토리</legend>
      <label for="tistory_blog_name">블로그 이름</label>
      <input type="text" id="tistory_blog_name" name="tistory_blog_name"
             value="{{ '' if '여기에' in cfg.tistory.blog_name else cfg.tistory.blog_name }}"
             placeholder="예: myblog">
      <small class="hint">블로그 주소가 https://myblog.tistory.com 이면 "myblog"만 입력하세요.</small>

      <label for="tistory_category_name">카테고리 (선택)</label>
      <input type="text" id="tistory_category_name" name="tistory_category_name"
             value="{{ cfg.tistory.category_name }}" placeholder="비워두면 기본 카테고리">
    </fieldset>

    <fieldset>
      <legend>디시인사이드</legend>
      <label for="dcinside_gallery_id">갤러리 ID</label>
      <input type="text" id="dcinside_gallery_id" name="dcinside_gallery_id"
             value="{{ '' if '여기에' in cfg.dcinside.gallery_id else cfg.dcinside.gallery_id }}"
             placeholder="예: programming">
      <small class="hint">갤러리 주소의 id= 뒤에 오는 값입니다. (gall.dcinside.com/board/lists/?id=programming)</small>

      <label for="dcinside_gallery_type">갤러리 종류</label>
      <select id="dcinside_gallery_type" name="dcinside_gallery_type">
        <option value="major" {% if cfg.dcinside.gallery_type != "minor" %}selected{% endif %}>정식 갤러리</option>
        <option value="minor" {% if cfg.dcinside.gallery_type == "minor" %}selected{% endif %}>마이너 갤러리</option>
      </select>
    </fieldset>

    <fieldset>
      <legend>게시 제한</legend>
      <div class="checkbox-row">
        <input type="checkbox" id="daily_limit" name="daily_limit" value="Y" {% if cfg.daily_limit != "N" %}checked{% endif %}>
        <label for="daily_limit">사이트당 하루 1건으로 제한</label>
      </div>
    </fieldset>

    <button type="submit">저장</button>
  </form>
</body>
</html>
